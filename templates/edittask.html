<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
		<title>Task Tracker - Edit task</title>
	</head>
	<body>
		<h1 id="edit_h1">Edit task</h1>
		<form action="{{ url_for('edit_task', id=task.id) }}" method="POST">
			<input type="hidden" name="_method" value="PUT">
			<label for="title">Task</label>
			<input type="text" name="title" value="{{ task.title }}">
			<select id="status" name="status" value="{{ task.status }}">
				<option value="Todo">To do</option>
				<option value="In progress">In progress</option>
				<option value="Complete">Complete</option>
			</select>
			<input type="submit" value="Submit" id="submit">
			<a href="{{ url_for('dashboard') }}"><button type="button" id="cancel">Cancel</button></a>
		</form>
	</body>
</html>
